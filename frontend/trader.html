<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>PayHub Trader</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg: #050816;
      --panel: #0d1324;
      --panel2: #111a2e;
      --panel3: #08111f;
      --line: rgba(255,255,255,.08);
      --text: #f8fafc;
      --muted: #94a3b8;
      --blue: #2563eb;
      --green: #16a34a;
      --red: #dc2626;
      --orange: #f59e0b;
      --purple: #7c3aed;
      --cyan: #06b6d4;
      --shadow: 0 20px 50px rgba(0,0,0,.35);
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(37,99,235,.22), transparent 28%),
        radial-gradient(circle at top right, rgba(124,58,237,.18), transparent 30%),
        linear-gradient(180deg, #050816 0%, #070b14 100%);
      color: var(--text);
      font-family: Arial, sans-serif;
    }

    .app {
      max-width: 980px;
      margin: 0 auto;
      padding: 14px;
      padding-bottom: 100px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      margin: -14px -14px 14px;
      padding: 14px;
      background: rgba(5,8,22,.88);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--line);
    }

    .brand-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      width: 44px;
      height: 44px;
      border-radius: 15px;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      display: grid;
      place-items: center;
      font-size: 22px;
      font-weight: 900;
      box-shadow: 0 12px 30px rgba(37,99,235,.25);
    }

    h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1;
    }

    .sub {
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 8px 11px;
      border-radius: 999px;
      font-weight: 900;
      font-size: 12px;
      white-space: nowrap;
      border: 1px solid rgba(255,255,255,.12);
    }

    .status-online {
      background: rgba(34,197,94,.12);
      color: #86efac;
      border-color: rgba(34,197,94,.25);
    }

    .status-pause {
      background: rgba(245,158,11,.12);
      color: #fde68a;
      border-color: rgba(245,158,11,.25);
    }

    .status-offline,
    .status-frozen {
      background: rgba(239,68,68,.12);
      color: #fecaca;
      border-color: rgba(239,68,68,.25);
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: currentColor;
    }

    .quick-actions {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }

    button {
      border: 0;
      border-radius: 14px;
      padding: 12px 10px;
      color: white;
      font-weight: 900;
      font-size: 14px;
      cursor: pointer;
      box-shadow: 0 10px 22px rgba(0,0,0,.22);
    }

    button:active {
      transform: scale(.98);
    }

    .btn-blue { background: linear-gradient(135deg, #2563eb, #1d4ed8); }
    .btn-green { background: linear-gradient(135deg, #16a34a, #15803d); }
    .btn-orange { background: linear-gradient(135deg, #f59e0b, #b45309); }
    .btn-red { background: linear-gradient(135deg, #dc2626, #991b1b); }
    .btn-gray { background: linear-gradient(135deg, #334155, #1e293b); }
    .btn-purple { background: linear-gradient(135deg, #7c3aed, #5b21b6); }
    .btn-cyan { background: linear-gradient(135deg, #06b6d4, #0891b2); }

    .tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 4px;
    }

    .tab {
      flex: 0 0 auto;
      background: rgba(255,255,255,.08);
      border: 1px solid var(--line);
      padding: 10px 13px;
      border-radius: 14px;
      color: var(--muted);
      font-weight: 900;
      font-size: 13px;
    }

    .tab.active {
      color: white;
      background: linear-gradient(135deg, rgba(37,99,235,.95), rgba(124,58,237,.9));
      border-color: rgba(37,99,235,.6);
    }

    .page {
      display: none;
    }

    .page.active {
      display: block;
    }
