<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>PayHub Admin v1</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg: #050816;
      --panel: #0d1324;
      --panel2: #111a2e;
      --panel3: #08111f;
      --line: rgba(255, 255, 255, 0.08);
      --text: #f8fafc;
      --muted: #94a3b8;
      --blue: #2563eb;
      --blue2: #1d4ed8;
      --green: #16a34a;
      --green2: #22c55e;
      --red: #dc2626;
      --orange: #f59e0b;
      --purple: #7c3aed;
      --cyan: #06b6d4;
      --shadow: 0 20px 50px rgba(0,0,0,.35);
      --radius: 22px;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, .22), transparent 28%),
        radial-gradient(circle at top right, rgba(124, 58, 237, .18), transparent 30%),
        linear-gradient(180deg, #050816 0%, #070b14 100%);
      color: var(--text);
      font-family: Arial, sans-serif;
    }

    .app {
      max-width: 1220px;
      margin: 0 auto;
      padding: 18px;
      padding-bottom: 120px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      margin: -18px -18px 18px;
      padding: 18px;
      backdrop-filter: blur(18px);
      background: rgba(5, 8, 22, .82);
      border-bottom: 1px solid var(--line);
    }

    .brand-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      width: 48px;
      height: 48px;
      border-radius: 16px;
      background:
        linear-gradient(135deg, #2563eb, #7c3aed);
      display: grid;
      place-items: center;
      font-size: 24px;
      font-weight: 900;
      box-shadow: 0 12px 30px rgba(37,99,235,.28);
    }

    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1;
      letter-spacing: -.5px;
    }

    .sub {
      color: var(--muted);
      font-size: 13px;
      margin-top: 5px;
    }

    .live {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(34,197,94,.12);
      color: #86efac;
      border: 1px solid rgba(34,197,94,.25);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
    }

    .pulse {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #22c55e;
      box-shadow: 0 0 0 0 rgba(34,197,94,.8);
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(34,197,94,.7); }
      70% { box-shadow: 0 0 0 10px rgba(34,197,94,0); }
      100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); }
    }

    .quick-actions {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 14px;
    }

    button {
      border: 0;
      border-radius: 16px;
      padding: 13px 14px;
      color: white;
      font-weight: 900;
      font-size: 15px;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(0,0,0,.22);
    }

    button:active {
      transform: scale(.98);
    }

    .btn-blue { background: linear-gradient(135deg, #2563eb, #1d4ed8); }
    .btn-green { background: linear-gradient(135deg, #16a34a, #15803d); }
    .btn-orange { background: linear-gradient(135deg, #f59e0b, #b45309); }
    .btn-red { background: linear-gradient(135deg, #dc2626, #991b1b); }
    .btn-purple { background: linear-gradient(135deg, #7c3aed, #5b21b6); }
    .btn-gray { background: linear-gradient(135deg, #334155, #1e293b); }
    .btn-cyan { background: linear-gradient(135deg, #06b6d4, #0891b2); }

    .tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 4px;
    }

    .tab {
      flex: 0 0 auto;
      background: rgba(255,255,255,.08);
      border: 1px solid var(--line);
      padding: 11px 14px;
      border-radius: 14px;
      color: var(--muted);
      font-weight: 900;
      font-size: 14px;
    }

    .tab.active {
      color: #fff;
      border-color: rgba(37,99,235,.65);
      background: linear-gradient(135deg, rgba(37,99,235,.95), rgba(124,58,237,.9));
      box-shadow: 0 14px 28px rgba(37,99,235,.18);
    }

    .page {
      display: none;
      animation: fade .25s ease;
    }

    .page.active {
      display: block;
    }

    @keyframes fade {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .section-title {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 10px;
      margin: 18px 0 12px;
    }

    .section-title h2 {
      margin: 0;
      font-size: 24px;
      letter-spacing: -.3px;
    }

    .section-title span {
      color: var(--muted);
      font-size: 13px;
    }
    .cards-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:14px;
      margin-bottom:22px;
    }

    .stat-card{
      background:linear-gradient(180deg,var(--panel),var(--panel2));
      border:1px solid var(--line);
      border-radius:22px;
      padding:18px;
      position:relative;
      overflow:hidden;
      box-shadow:var(--shadow);
    }

    .stat-card::before{
      content:"";
      position:absolute;
      right:-30px;
      top:-30px;
      width:120px;
      height:120px;
      border-radius:50%;
      background:rgba(255,255,255,.04);
    }

    .stat-title{
      color:var(--muted);
      font-size:13px;
    }

    .stat-value{
      margin-top:10px;
      font-size:34px;
      font-weight:900;
    }

    .stat-bottom{
      margin-top:12px;
      color:#4ade80;
      font-size:13px;
    }

    .panel{
      background:linear-gradient(180deg,var(--panel),var(--panel2));
      border-radius:22px;
      border:1px solid var(--line);
      padding:18px;
      margin-bottom:18px;
      box-shadow:var(--shadow);
    }

    .list{
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .item{
      background:var(--panel3);
      border:1px solid rgba(255,255,255,.06);
      border-radius:18px;
      padding:16px;
    }

    .item-top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:12px;
    }

    .item-title{
      font-size:18px;
      font-weight:900;
    }

    .badge{
      padding:6px 12px;
      border-radius:999px;
      font-size:12px;
      font-weight:900;
    }

    .online{background:#064e3b;color:#86efac;}
    .pause{background:#78350f;color:#fde68a;}
    .offline{background:#374151;color:#d1d5db;}
    .frozen{background:#7f1d1d;color:#fecaca;}

    .waiting{
      background:#78350f;
      color:#fde68a;
    }

    .paid{
      background:#064e3b;
      color:#86efac;
    }

    .cancelled,
    .rejected,
    .expired{
      background:#7f1d1d;
      color:#fecaca;
    }

    .info-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    .info{
      background:rgba(255,255,255,.03);
      border-radius:14px;
      padding:10px;
    }

    .info small{
      display:block;
      color:var(--muted);
      margin-bottom:6px;
    }

    .info strong{
      font-size:16px;
    }

    .buttons{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:16px;
    }

    .buttons button{
      flex:1;
      min-width:120px;
    }

    .event{
      display:flex;
      gap:12px;
      align-items:flex-start;
      padding:12px 0;
      border-bottom:1px solid rgba(255,255,255,.05);
    }

    .event:last-child{
      border-bottom:0;
    }

    .dot{
      width:14px;
      height:14px;
      border-radius:50%;
      background:#2563eb;
      margin-top:5px;
    }

    .event-text{
      flex:1;
    }

    .event-title{
      font-weight:800;
      margin-bottom:4px;
    }

    .event-time{
      color:var(--muted);
      font-size:12px;
    }

    pre{
      background:#020617;
      border-radius:16px;
      padding:16px;
      overflow:auto;
      color:#cbd5e1;
      font-size:13px;
      max-height:300px;
    }

    @media(max-width:700px){

      .brand-row{
        flex-direction:column;
        align-items:flex-start;
      }

      .quick-actions{
        grid-template-columns:1fr 1fr;
      }

      .info-grid{
        grid-template-columns:1fr;
      }

    }

  </style>
</head>

<body>

<div class="topbar">

<div class="brand-row">

<div class="brand">

<div class="logo">
₽
</div>

<div>

<h1>PayHub Admin</h1>

<div class="sub">
Commercial P2P Processing Platform
</div>

</div>

</div>

<div class="live">

<div class="pulse"></div>

ONLINE

</div>

</div>

<div class="quick-actions">

<button class="btn-blue" onclick="refreshAll()">
🔄 Обновить
</button>

<button class="btn-orange" onclick="createTestOrder()">
➕ Тест заявка
</button>

<button class="btn-purple" onclick="createTrader()">
👤 Трейдер
</button>

<button class="btn-green" onclick="createCard()">
💳 Карта
</button>

</div>

<div class="tabs">

<div class="tab active" onclick="openTab('dashboard',this)">
Dashboard
</div>

<div class="tab" onclick="openTab('orders',this)">
Заявки
</div>

<div class="tab" onclick="openTab('traders',this)">
Трейдеры
</div>

<div class="tab" onclick="openTab('cards',this)">
Карты
</div>

<div class="tab" onclick="openTab('events',this)">
Журнал
</div>

</div>

</div>

<div class="app">
