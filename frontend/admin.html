<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PayHub Admin</title>
  <style>
    body{margin:0;font-family:Arial,sans-serif;background:#0f1115;color:white;padding:16px}
    h1{font-size:34px;margin:0 0 18px}
    h2{margin:0 0 14px}
    button{border:0;border-radius:14px;background:#1f6feb;color:white;padding:14px 18px;font-size:16px;font-weight:800}
    .buttons{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:18px}
    .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:18px}
    .stat,.section,.item{background:#171a21;border:1px solid #2a2f3a;border-radius:18px;padding:16px}
    .label{color:#9aa4b2;font-size:14px}
    .value{font-size:30px;font-weight:900;margin-top:8px}
    .section{margin-bottom:18px}
    .list{display:grid;gap:12px}
    .row{display:flex;justify-content:space-between;gap:12px;border-bottom:1px solid #2a2f3a;padding:8px 0}
    .row:last-child{border-bottom:0}
    .muted{color:#9aa4b2}
    .badge{display:inline-block;padding:6px 10px;border-radius:999px;font-size:12px;font-weight:900}
    .paid,.on{background:#143d24;color:#7ee787}
    .wait{background:#3b2f14;color:#ffcc66}
    .bad,.off{background:#3a1616;color:#ff8b8b}
    @media(max-width:700px){.grid{grid-template-columns:1fr}h1{font-size:30px}}
  </style>
</head>
<body>
  <h1>PayHub Admin</h1>

  <div class="buttons">
    <button onclick="loadAll()">Обновить</button>
    <button onclick="createTestOrder()">Тест заявка</button>
  </div>

  <div class="grid">
    <div class="stat"><div class="label">Всего ордеров</div><div class="value" id="total">0</div></div>
    <div class="stat"><div class="label">Ожидают</div><div class="value" id="waiting">0</div></div>
    <div class="stat"><div class="label">Оплачено</div><div class="value" id="paid">0</div></div>
    <div class="stat"><div class="label">Оборот UAH</div><div class="value" id="turnover">0</div></div>
    <div class="stat"><div class="label">Профит трейдеров</div><div class="value" id="profit">0</div></div>
    <div class="stat"><div class="label">Активные карты</div><div class="value" id="activeCards">0</div></div>
  </div>

  <div class="section">
    <h2>Ордера</h2>
    <div id="orders" class="list"></div>
  </div>

  <div class="section">
    <h2>Трейдеры</h2>
    <div id="traders" class="list"></div>
  </div>

  <div class="section">
    <h2>Карты</h2>
    <div id="cards" class="list"></div>
  </div>

<script>
const ADMIN_API = "https://payhub-backend-kn3h.onrender.com/api/admin";
const MERCHANT_API = "https://payhub-backend-kn3h.onrender.com/api/merchant";

async function get(url){
  const res = await fetch(url);
  return await res.json();
}

async function post(url, body){
  const res = await fetch(url,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(body || {})
  });
  return await res.json();
}

function statusBadge(status){
  if(status === "PAID") return '<span class="badge paid">PAID</span>';
  if(status === "WAITING_PAYMENT") return '<span class="badge wait">WAITING</span>';
  if(status === "REJECTED") return '<span class="badge bad">REJECTED</span>';
  return '<span class="badge bad">' + (status || "-") + '</span>';
}

async function loadStats(){
  const data = await get(ADMIN_API + "/stats");
  const s = data.stats || {};
  document.getElementById("total").textContent = s.total_orders || 0;
  document.getElementById("waiting").textContent = s.waiting_orders || 0;
  document.getElementById("paid").textContent = s.paid_orders || 0;
  document.getElementById("turnover").textContent = s.turnover_uah || 0;
  document.getElementById("profit").textContent = s.trader_profit_uah || 0;
  document.getElementById("activeCards").textContent = s.active_cards || 0;
}

async function loadOrders(){
  const data = await get(ADMIN_API + "/orders");
  const box = document.getElementById("orders");
  box.innerHTML = "";

  if(!data.orders || data.orders.length === 0){
    box.innerHTML = '<div class="muted">Ордеров пока нет</div>';
    return;
  }

  data.orders.forEach(o=>{
    box.innerHTML += `
      <div class="item">
        <div class="row"><span class="muted">Order</span><b>${o.merchant_order_id || "-"}</b></div>
        <div class="row"><span class="muted">Сумма</span><b>${o.amount || 0} ${o.currency || "UAH"}</b></div>
        <div class="row"><span class="muted">Статус</span>${statusBadge(o.status)}</div>
        <div class="row"><span class="muted">Трейдер</span><b>${o.assigned_trader_name || o.assigned_trader_id || "-"}</b></div>
        <div class="row"><span class="muted">Карта</span><b>${o.bank || "-"} ${o.card_number || ""}</b></div>
        <div class="row"><span class="muted">Профит</span><b>${o.trader_profit_uah || 0} UAH</b></div>
      </div>`;
  });
}

async function loadTraders(){
  const data = await get(ADMIN_API + "/traders");
  const box = document.getElementById("traders");
  box.innerHTML = "";

  (data.traders || []).forEach(t=>{
    box.innerHTML += `
      <div class="item">
        <div class="row"><span class="muted">ID</span><b>${t.id}</b></div>
        <div class="row"><span class="muted">Имя</span><b>${t.name}</b></div>
        <div class="row"><span class="muted">Статус</span><b>${t.status}</b></div>
        <div class="row"><span class="muted">Процент</span><b>${t.percent}%</b></div>
        <div class="row"><span class="muted">USDT</span><b>${t.available_usdt}</b></div>
      </div>`;
  });
}

async function loadCards(){
  const data = await get(ADMIN_API + "/cards");
  const box = document.getElementById("cards");
  box.innerHTML = "";

  (data.cards || []).forEach(c=>{
    box.innerHTML += `
      <div class="item">
        <div class="row"><span class="muted">ID</span><b>${c.id}</b></div>
        <div class="row"><span class="muted">Банк</span><b>${c.bank}</b></div>
        <div class="row"><span class="muted">Карта</span><b>${c.card_number}</b></div>
        <div class="row"><span class="muted">Владелец</span><b>${c.card_holder}</b></div>
        <div class="row"><span class="muted">Мин/Макс</span><b>${c.min_amount}-${c.max_amount}</b></div>
        <div class="row"><span class="muted">День</span><b>${c.daily_limit}</b></div>
        <div class="row"><span class="muted">Статус</span>${c.active ? '<span class="badge on">ACTIVE</span>' : '<span class="badge off">OFF</span>'}</div>
      </div>`;
  });
}

async function createTestOrder(){
  const id = "ORDER_" + Date.now();
  await post(MERCHANT_API + "/create-order", {
    merchant_id:"merchant_demo",
    order_id:id,
    amount:4200,
    currency:"UAH"
  });
  await loadAll();
}

async function loadAll(){
  await loadStats();
  await loadOrders();
  await loadTraders();
  await loadCards();
}

loadAll();
</script>
</body>
</html>
