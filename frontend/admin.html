<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PayHub Admin Panel</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #060b16;
      color: #ffffff;
      font-family: Arial, sans-serif;
    }

    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px 16px 40px;
    }

    h1 {
      margin: 0 0 20px;
      font-size: 28px;
      line-height: 1.2;
      font-weight: 800;
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }

    .btn {
      border: 0;
      border-radius: 16px;
      padding: 16px 14px;
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      min-height: 56px;
    }

    .btn.blue { background: #2563eb; }
    .btn.orange { background: #b66a00; }
    .btn.purple { background: #6d28d9; }
    .btn.green { background: #15803d; }
    .btn.gray { background: #2b3242; }

    .grid-stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 22px;
    }

    .card {
      background: #121826;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 0 0 1px rgba(82, 104, 160, 0.05), 0 10px 30px rgba(0,0,0,0.18);
      margin-bottom: 22px;
    }

    .stat-label {
      color: #aab2c5;
      font-size: 18px;
      margin-bottom: 14px;
    }

    .stat-value {
      font-size: 64px;
      line-height: 1;
      font-weight: 800;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    .section-title {
      font-size: 30px;
      line-height: 1.1;
      font-weight: 800;
      margin: 0;
    }

    .mini-btn {
      border: 0;
      border-radius: 18px;
      padding: 14px 18px;
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      background: #2b3242;
      cursor: pointer;
      white-space: nowrap;
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .item {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 22px;
      padding: 18px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      align-items: center;
    }

    .row:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .row:first-child {
      padding-top: 0;
    }

    .key {
      color: #aab2c5;
      font-size: 18px;
      flex: 0 0 42%;
      word-break: break-word;
    }

    .val {
      font-size: 18px;
      font-weight: 700;
      text-align: right;
      flex: 1;
      word-break: break-word;
    }

    .muted {
      color: #aab2c5;
      font-weight: 500;
    }

    .status {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 16px;
      border-radius: 999px;
      font-size: 16px;
      font-weight: 800;
      min-width: 110px;
      text-transform: uppercase;
    }

    .status.active,
    .status.paid,
    .status.online {
      background: rgba(22, 163, 74, 0.25);
      color: #7ef29b;
    }

    .status.waiting {
      background: rgba(217, 119, 6, 0.25);
      color: #ffd166;
    }

    .status.rejected,
    .status.cancelled,
    .status.offline,
    .status.disabled {
      background: rgba(220, 38, 38, 0.22);
      color: #ff8d8d;
    }

    .item-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .action-btn {
      border: 0;
      border-radius: 14px;
      padding: 12px 16px;
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
    }

    .action-btn.green { background: #15803d; }
    .action-btn.red { background: #b42318; }
    .action-btn.gray { background: #2b3242; }
    .action-btn.blue { background: #2563eb; }

    pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 15px;
      line-height: 1.45;
      background: #040814;
      border-radius: 18px;
      padding: 18px;
      overflow: auto;
      color: #fff;
    }

    .empty {
      padding: 18px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      color: #b7bfd1;
      font-size: 18px;
      background: rgba(255,255,255,0.02);
    }

    .small-note {
      margin-top: 10px;
      color: #8d96aa;
      font-size: 14px;
    }

    @media (max-width: 720px) {
      .actions,
      .grid-stats {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 26px;
      }

      .section-title {
        font-size: 28px;
      }

      .stat-value {
        font-size: 54px;
      }

      .key,
      .val {
        font-size: 17px;
      }

      .section-head {
        flex-direction: row;
        align-items: center;
      }

      .mini-btn {
        padding: 12px 16px;
        font-size: 15px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>PayHub Admin Panel</h1>

    <div class="actions">
      <button class="btn blue" onclick="loadAll()">Обновить данные</button>
      <button class="btn orange" onclick="createTestOrder()">Создать тестовый ордер</button>
      <button class="btn purple" onclick="createTrader()">Добавить трейдера</button>
      <button class="btn green" onclick="createCard()">Добавить карту</button>
    </div>

    <div id="statsGrid" class="grid-stats"></div>

    <div class="card">
      <div class="section-head">
        <h2 class="section-title">Ордеры</h2>
        <button class="mini-btn" onclick="loadOrders()">Обновить ордера</button>
      </div>
      <div id="ordersBox" class="list"></div>
    </div>

    <div class="card">
      <div class="section-head">
        <h2 class="section-title">Трейдеры</h2>
        <button class="mini-btn" onclick="loadTraders()">Обновить трейдеров</button>
      </div>
      <div id="tradersBox" class="list"></div>
    </div>

    <div class="card">
      <div class="section-head">
        <h2 class="section-title">Карты</h2>
        <button class="mini-btn" onclick="loadCards()">Обновить карты</button>
      </div>
      <div id="cardsBox" class="list"></div>
    </div>

    <div class="card">
      <h2 class="section-title" style="margin-bottom:16px;">Ответ API</h2>
      <pre id="apiOutput">Нажми кнопку сверху</pre>
      <div class="small-note">Если что-то не работает — смотри сюда, тут будет ошибка с сервера.</div>
    </div>
  </div>

  <script>
    function setApiOutput(data) {
      document.getElementById("apiOutput").textContent =
        typeof data === "string" ? data : JSON.stringify(data, null, 2);
    }

    async function apiGet(url) {
      const res = await fetch(url);
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        throw new Error(data.message || data.error || ("GET " + url + " failed"));
      }
      return data;
    }

    async function apiPost(url, body = {}) {
      const res = await fetch(url, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(body)
      });

      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        throw new Error(data.message || data.error || ("POST " + url + " failed"));
      }
      return data;
    }

    async function apiPatch(url, body = {}) {
      const res = await fetch(url, {
        method: "PATCH",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(body)
      });

      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        throw new Error(data.message || data.error || ("PATCH " + url + " failed"));
      }
      return data;
    }

    function statusClass(status) {
      const s = String(status || "").toLowerCase();
      if (["active", "paid", "online"].includes(s)) return s;
      if (["waiting"].includes(s)) return s;
      if (["rejected", "cancelled", "offline", "disabled"].includes(s)) return s;
      return "";
    }

    function escapeHtml(v) {
      return String(v ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function renderStats(stats) {
      const statsGrid = document.getElementById("statsGrid");

      const cards = [
        { label: "Всего ордеров", value: stats.total_orders ?? 0 },
        { label: "В ожидании", value: stats.waiting_orders ?? 0 },
        { label: "Оплачено", value: stats.paid_orders ?? 0 },
        { label: "Отклонено", value: stats.rejected_orders ?? 0 },
        { label: "Оборот UAH", value: stats.turnover_uah ?? 0 },
        { label: "Профит трейдеров", value: stats.trader_profit_uah ?? 0 },
        { label: "Карт всего", value: stats.cards_count ?? 0 },
        { label: "Активные карты", value: stats.active_cards ?? 0 }
      ];

      statsGrid.innerHTML = cards.map(card => `
        <div class="card" style="margin-bottom:0;">
          <div class="stat-label">${escapeHtml(card.label)}</div>
          <div class="stat-value">${escapeHtml(card.value)}</div>
        </div>
      `).join("");
    }

    function renderOrders(orders) {
      const box = document.getElementById("ordersBox");

      if (!orders || !orders.length) {
        box.innerHTML = `<div class="empty">Ордеров пока нет</div>`;
        return;
      }

      box.innerHTML = orders.map(order => {
        const status = order.status || "unknown";
        const canHandle = status === "waiting";

        return `
          <div class="item">
            <div class="row">
              <div class="key">Order</div>
              <div class="val">${escapeHtml(order.id)}</div>
            </div>

            <div class="row">
              <div class="key">Сумма</div>
              <div class="val">${escapeHtml(order.amount_uah)} UAH</div>
            </div>

            <div class="row">
              <div class="key">Статус</div>
              <div class="val">
                <span class="status ${statusClass(status)}">${escapeHtml(status)}</span>
              </div>
            </div>

            <div class="row">
              <div class="key">Трейдер</div>
              <div class="val">${escapeHtml(order.trader_name || order.trader_id || "-")}</div>
            </div>

            <div class="row">
              <div class="key">Карта</div>
              <div class="val">
                ${escapeHtml(order.bank || "-")}<br>
                ${escapeHtml(order.card_number || "-")}
              </div>
            </div>

            <div class="row">
              <div class="key">Профит</div>
              <div class="val">${escapeHtml(order.trader_profit_uah ?? 0)} UAH</div>
            </div>

            <div class="row">
              <div class="key">Создан</div>
              <div class="val muted">${escapeHtml(order.created_at || "-")}</div>
            </div>

            ${canHandle ? `
              <div class="item-actions">
                <button class="action-btn green" onclick="markPaid('${escapeHtml(order.id)}')">Оплатить</button>
                <button class="action-btn red" onclick="rejectOrder('${escapeHtml(order.id)}')">Отклонить</button>
              </div>
            ` : ""}
          </div>
        `;
      }).join("");
    }

    function renderTraders(traders) {
      const box = document.getElementById("tradersBox");

      if (!traders || !traders.length) {
        box.innerHTML = `<div class="empty">Трейдеров пока нет</div>`;
        return;
      }

      box.innerHTML = traders.map(trader => `
        <div class="item">
          <div class="row">
            <div class="key">ID</div>
            <div class="val">${escapeHtml(trader.id)}</div>
          </div>

          <div class="row">
            <div class="key">Имя</div>
            <div class="val">${escapeHtml(trader.name)}</div>
          </div>

          <div class="row">
            <div class="key">Статус</div>
            <div class="val">
              <span class="status ${statusClass(trader.status || "")}">
                ${escapeHtml(trader.status || "-")}
              </span>
            </div>
          </div>

          <div class="row">
            <div class="key">Процент</div>
            <div class="val">${escapeHtml(trader.percent ?? 0)}%</div>
          </div>

          <div class="row">
            <div class="key">USDT доступно</div>
            <div class="val">${escapeHtml(trader.available_usdt ?? 0)}</div>
          </div>

          <div class="row">
            <div class="key">USDT в резерве</div>
            <div class="val">${escapeHtml(trader.reserved_usdt ?? 0)}</div>
          </div>
        </div>
      `).join("");
    }

    function renderCards(cards) {
      const box = document.getElementById("cardsBox");

      if (!cards || !cards.length) {
        box.innerHTML = `<div class="empty">Карт пока нет</div>`;
        return;
      }

      box.innerHTML = cards.map(card => `
        <div class="item">
          <div class="row">
            <div class="key">ID</div>
            <div class="val">${escapeHtml(card.id)}</div>
          </div>

          <div class="row">
            <div class="key">Банк</div>
            <div class="val">${escapeHtml(card.bank)}</div>
          </div>

          <div class="row">
            <div class="key">Карта</div>
            <div class="val">${escapeHtml(card.card_number)}</div>
          </div>

          <div class="row">
            <div class="key">Владелец</div>
            <div class="val">${escapeHtml(card.card_holder)}</div>
          </div>

          <div class="row">
            <div class="key">Трейдер</div>
            <div class="val">${escapeHtml(card.trader_id)}</div>
          </div>

          <div class="row">
            <div class="key">Мин / Макс</div>
            <div class="val">${escapeHtml(card.min_amount)} - ${escapeHtml(card.max_amount)}</div>
          </div>

          <div class="row">
            <div class="key">Лимит / день</div>
            <div class="val">${escapeHtml(card.daily_limit)}</div>
          </div>

          <div class="row">
            <div class="key">Платежей сегодня</div>
            <div class="val">${escapeHtml(card.payments_today ?? 0)} / ${escapeHtml(card.max_payments_per_day ?? 0)}</div>
          </div>

          <div class="row">
            <div class="key">Оборот сегодня</div>
            <div class="val">${escapeHtml(card.turnover_today ?? 0)}</div>
          </div>

          <div class="row">
            <div class="key">Статус</div>
            <div class="val">
              <span class="status ${card.active ? "active" : "disabled"}">
                ${card.active ? "ACTIVE" : "DISABLED"}
              </span>
            </div>
          </div>

          <div class="row">
            <div class="key">Занята</div>
            <div class="val">${card.reserved ? "Да" : "Нет"}</div>
          </div>

          <div class="item-actions">
            <button class="action-btn gray" onclick="toggleCard('${escapeHtml(card.id)}')">
              ${card.active ? "Выключить карту" : "Включить карту"}
            </button>
          </div>
        </div>
      `).join("");
    }

    async function loadStats() {
      try {
        const data = await apiGet("/api/admin/stats");
        renderStats(data.stats || {});
        setApiOutput(data);
      } catch (e) {
        setApiOutput({ success: false, error: e.message });
      }
    }

    async function loadOrders() {
      try {
        const data = await apiGet("/api/admin/orders");
        renderOrders(data.orders || []);
        setApiOutput(data);
      } catch (e) {
        setApiOutput({ success: false, error: e.message });
      }
    }

    async function loadTraders() {
      try {
        const data = await apiGet("/api/admin/traders");
        renderTraders(data.traders || []);
        setApiOutput(data);
      } catch (e) {
        setApiOutput({ success: false, error: e.message });
      }
    }

    async function loadCards() {
      try {
        const data = await apiGet("/api/admin/cards");
        renderCards(data.cards || []);
        setApiOutput(data);
      } catch (e) {
        setApiOutput({ success: false, error: e.message });
      }
    }

    async function loadAll() {
      try {
        const [statsData, ordersData, tradersData, cardsData] = await Promise.all([
          apiGet("/api/admin/stats"),
          apiGet("/api/admin/orders"),
          apiGet("/api/admin/traders"),
          apiGet("/api/admin/cards")
        ]);

        renderStats(statsData.stats || {});
        renderOrders(ordersData.orders || []);
        renderTraders(tradersData.traders || []);
        renderCards(cardsData.cards || []);

        setApiOutput({
          success: true,
          stats: statsData.stats,
          orders_count: (ordersData.orders || []).length,
          traders_count: (tradersData.traders || []).length,
          cards_count: (cardsData.cards || []).length
        });
      } catch (e) {
        setApiOutput({ success: false, error: e.message });
      }
    }

    async function createTestOrder() {
      const amount = prompt("Сумма ордера в UAH", "4200");
      if (!amount) return;

      try {
        const data = await apiPost("/api/admin/orders/create", {
          amount_uah: Number(amount)
        });
        setApiOutput(data);
        await loadAll();
      } catch (e) {
        setApiOutput({ success: false, error: e.message });
      }
    }

    async function createTrader() {
      const name = prompt("Имя трейдера", "Trader_2");
      if (!name) return;

      const percent = prompt("Процент трейдера", "4.5");
      if (percent === null) return;

      const availableUsdt = prompt("Баланс USDT", "500");
      if (availableUsdt === null) return;

      try {
        const data = await apiPost("/api/admin/traders/create", {
          name: name.trim(),
          percent: Number(percent),
          available_usdt: Number(availableUsdt)
        });

        setApiOutput(data);
        await loadAll();
      } catch (e) {
        setApiOutput({ success: false, error: e.message });
      }
    }

    async function createCard() {
      try {
        const tradersData = await apiGet("/api/admin/traders");
        const traders = tradersData.traders || [];

        if (!traders.length) {
          setApiOutput({
            success: false,
            error: "Сначала создай трейдера"
          });
          return;
        }

        const traderList = traders.map(t => `${t.id} (${t.name})`).join("\n");
        const traderId = prompt(
          "Введите trader_id для карты:\n\n" + traderList,
          traders[0].id
        );
        if (!traderId) return;

        const bank = prompt("Банк", "Monobank");
        if (!bank) return;

        const cardNumber = prompt("Номер карты", "5375410000009999");
        if (!cardNumber) return;

        const cardHolder = prompt("Владелец карты", "PAYHUB NEW CARD");
        if (!cardHolder) return;

        const minAmount = prompt("Мин. сумма", "1000");
        if (minAmount === null) return;

        const maxAmount = prompt("Макс. сумма", "6000");
        if (maxAmount === null) return;

        const dailyLimit = prompt("Дневной лимит", "500000");
        if (dailyLimit === null) return;

        const data = await apiPost("/api/admin/cards/create", {
          trader_id: traderId.trim(),
          bank: bank.trim(),
          card_number: cardNumber.trim(),
          card_holder: cardHolder.trim(),
          min_amount: Number(minAmount),
          max_amount: Number(maxAmount),
          daily_limit: Number(dailyLimit)
        });

        setApiOutput(data);
        await loadAll();
      } catch (e) {
        setApiOutput({ success: false, error: e.message });
      }
    }

    async function markPaid(orderId) {
      if (!confirm(`Отметить ордер ${orderId} как оплаченный?`)) return;

      try {
        const data = await apiPatch(`/api/admin/orders/${orderId}/paid`);
        setApiOutput(data);
        await loadAll();
      } catch (e) {
        setApiOutput({ success: false, error: e.message });
      }
    }

    async function rejectOrder(orderId) {
      if (!confirm(`Отклонить ордер ${orderId}?`)) return;

      try {
        const data = await apiPatch(`/api/admin/orders/${orderId}/reject`);
        setApiOutput(data);
        await loadAll();
      } catch (e) {
        setApiOutput({ success: false, error: e.message });
      }
    }

    async function toggleCard(cardId) {
      if (!confirm(`Переключить статус карты ${cardId}?`)) return;

      try {
        const data = await apiPatch(`/api/admin/cards/${cardId}/toggle`);
        setApiOutput(data);
        await loadAll();
      } catch (e) {
        setApiOutput({ success: false, error: e.message });
      }
    }

    loadAll();
  </script>
</body>
</html>
