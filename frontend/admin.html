<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PayHub Admin</title>
  <style>
    body { margin:0; font-family:Arial,sans-serif; background:#0f1115; color:white; padding:16px; }
    h1 { margin-top:0; }
    button { padding:12px 14px; margin:6px 4px; border:0; border-radius:10px; background:#1f6feb; color:white; font-weight:700; }
    .box { background:#171a21; border:1px solid #2a2f3a; border-radius:12px; padding:14px; margin:12px 0; }
    pre { white-space:pre-wrap; word-break:break-word; background:#090b10; padding:12px; border-radius:10px; }
  </style>
</head>
<body>
  <h1>PayHub Admin Panel</h1>

  <div>
    <button onclick="loadStats()">Статистика</button>
    <button onclick="loadOrders()">Ордера</button>
    <button onclick="loadTraders()">Трейдеры</button>
    <button onclick="loadCards()">Карты</button>
  </div>

  <div class="box">
    <h2>Ответ API</h2>
    <pre id="output">Нажми кнопку сверху</pre>
  </div>

  <script>
    const API = "https://payhub-backend-kn3h.onrender.com/api/admin";

    async function show(url) {
      const out = document.getElementById("output");
      out.textContent = "Загрузка...";
      try {
        const res = await fetch(url);
        const data = await res.json();
        out.textContent = JSON.stringify(data, null, 2);
      } catch (e) {
        out.textContent = "Ошибка: " + e.message;
      }
    }

    function loadStats() {
      show(API + "/stats");
    }

    function loadOrders() {
      show(API + "/orders");
    }

    function loadTraders() {
      show(API + "/traders");
    }

    function loadCards() {
      show(API + "/cards");
    }
  </script>
</body>
</html>
